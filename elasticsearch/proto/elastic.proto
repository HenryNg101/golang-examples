syntax = "proto3";

package logs;

option go_package = "grpc-demo/proto;proto";

service ElasticSearchService {
    rpc SearchByRequest(SearchRequest) returns (SearchResponse);
    rpc StreamSearch(SearchRequest) returns (stream Document);
    rpc BulkUpload(stream BulkEntry) returns (UploadSummary);
}

message SearchRequest {
    string query = 1;
    string search_type = 2;
    string search_field = 3;
    int32 limit = 4;
    repeated string output_fields = 5;
}

message SearchResponse {
    optional double max_score = 1;
    repeated string documents = 2;
}

message Document {
    string json = 1;
}

message BulkEntry {
    string operations = 1;
}

message UploadSummary {
    int32 success_count = 1;
    int32 documents_sent = 2;
}